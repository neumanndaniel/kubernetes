---
apiVersion: v1
kind: Namespace
metadata:
  name: netperf
  labels:
    app.kubernetes.io/name: network-performance-test
    io.cilium/mtls-enabled: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iperf3-server
  namespace: netperf
  labels:
    app: iperf3-server
    role: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iperf3-server
  template:
    metadata:
      labels:
        app: iperf3-server
        role: server
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    role: client
                topologyKey: kubernetes.io/hostname
      containers:
        - name: iperf3-server
          image: cilium/netperf:latest
          command: ["iperf3", "--server", "--forceflush"]
          ports:
            - name: iperf3-tcp
              containerPort: 5201
              protocol: TCP
            - name: iperf3-udp
              containerPort: 5201
              protocol: UDP
          resources:
            requests:
              cpu: "200m"
              memory: "64Mi"
            limits:
              cpu: "2"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: iperf3-server
  namespace: netperf
spec:
  selector:
    app: iperf3-server
  ports:
    - name: iperf3-tcp
      port: 5201
      targetPort: 5201
      protocol: TCP
    - name: iperf3-udp
      port: 5201
      targetPort: 5201
      protocol: UDP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netperf-server
  namespace: netperf
  labels:
    app: netperf-server
    role: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netperf-server
  template:
    metadata:
      labels:
        app: netperf-server
        role: server
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    role: client
                topologyKey: kubernetes.io/hostname
      containers:
        - name: netperf-server
          image: cilium/netperf:latest
          command: ["netserver", "-D", "-f"]
          ports:
            - name: netperf-ctrl
              containerPort: 12865
              protocol: TCP
          resources:
            requests:
              cpu: "200m"
              memory: "64Mi"
            limits:
              cpu: "2"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: netperf-server
  namespace: netperf
spec:
  clusterIP: None
  selector:
    app: netperf-server
  ports:
    - name: netperf-ctrl
      port: 12865
      targetPort: 12865
      protocol: TCP
---
apiVersion: v1
kind: Pod
metadata:
  name: netperf-client
  namespace: netperf
  labels:
    app: netperf-client
    role: client
spec:
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              role: server
          topologyKey: kubernetes.io/hostname
  containers:
    - name: client
      image: cilium/netperf:latest
      command: ["sleep", "infinity"]
      resources:
        requests:
          cpu: "200m"
          memory: "64Mi"
        limits:
          cpu: "2"
          memory: "256Mi"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        capabilities:
          drop: ["ALL"]
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}
  restartPolicy: Never
